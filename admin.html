<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:30px;
}

.box{
max-width:900px;
margin:auto;
background:#1b1b1b;
padding:30px;
border-radius:20px;
}

h1{
color:gold;
}

.card{
background:#222;
padding:20px;
border-radius:15px;
margin-top:20px;
}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
}

table th{
background:gold;
color:black;
padding:15px;
}

table td{
padding:15px;
border-bottom:1px solid #444;
}

</style>

</head>

<body>

<div class="box">

<h1>

🐔 Three Brothers Admin Panel

</h1>

<div class="card">

<h2 id="income">

Total Income : ₹0

</h2>

</div>

<div class="card">

<h2 id="orders">

Total Orders : 0

</h2>

</div>

<table>

<thead>

<tr>

<th>Customer</th>

<th>Product</th>

<th>KG</th>

<th>Total</th>

</tr>

</thead>

<tbody id="tableData">

</tbody>

</table>

</div>

<script>

let bills =
JSON.parse(localStorage.getItem("bills")) || [];

let totalIncome = 0;

document.getElementById("orders").innerHTML =
"Total Orders : " + bills.length;

bills.forEach(bill=>{

totalIncome += Number(bill.total);

document.getElementById("tableData").innerHTML += `

<tr>

<td>${bill.name}</td>

<td>${bill.product}</td>

<td>${bill.kg}</td>

<td>₹${bill.total}</td>

</tr>

`;

});

document.getElementById("income").innerHTML =
"Total Income : ₹" + totalIncome;

</script>

</body>

</html>
