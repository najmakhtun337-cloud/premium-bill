<!-- FILE NAME: premium-bill.html -->
<!-- THREE BROTHERS FRESH CHICKEN -->
<!-- PROFESSIONAL THERMAL BILL SYSTEM 😈 -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Three Brothers Thermal Bill</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:monospace;
}

body{
background:#111;
padding:10px;
}

/* MAIN */

.main-box{
max-width:420px;
margin:auto;
background:#1b1b1b;
padding:15px;
border-radius:10px;
}

.main-title{
text-align:center;
font-size:22px;
color:gold;
margin-bottom:15px;
}

/* INPUT */

.input-grid{
display:flex;
flex-direction:column;
gap:10px;
}

.input-grid input{
padding:12px;
border:none;
background:#2a2a2a;
color:white;
border-radius:6px;
font-size:13px;
outline:none;
}

/* BUTTON */

.generate-btn{
margin-top:15px;
padding:12px;
border:none;
background:gold;
color:black;
font-size:14px;
font-weight:bold;
border-radius:6px;
cursor:pointer;
width:100%;
}

/* BILL */

.bill{
display:none;
width:300px;
background:white;
color:black;
margin:20px auto;
padding:10px;
font-size:12px;
}

/* CENTER */

.center{
text-align:center;
}

.line{
border-top:1px dashed black;
margin:8px 0;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:11px;
}

th{
border-bottom:1px dashed black;
padding-bottom:5px;
}

td{
padding-top:8px;
text-align:center;
}

/* TOTAL */

.total{
margin-top:10px;
border-top:1px dashed black;
padding-top:10px;
}

.total p{
display:flex;
justify-content:space-between;
margin-top:5px;
}

/* THANK YOU */

.thankyou{
margin-top:15px;
text-align:center;
border-top:1px dashed black;
padding-top:10px;
}

/* BUTTONS */

.buttons{
margin-top:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.buttons button{
padding:12px;
border:none;
font-size:14px;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

.print-btn{
background:black;
color:white;
}

.save-btn{
background:gold;
color:black;
}

/* PRINT */

@media print{

body{
background:white;
padding:0;
}

.main-box{
display:none;
}

.buttons{
display:none;
}

.bill{
display:block;
width:58mm;
margin:0;
padding:5px;
box-shadow:none;
}

}

</style>

</head>

<body>

<div class="main-box">

<h1 class="main-title">

🐔 THERMAL BILL SYSTEM

</h1>

<!-- CUSTOMER -->

<div class="input-grid">

<input type="text" id="customerName" placeholder="Customer Name">

<!-- SKINLESS -->

<input type="number" id="skinlessKG" placeholder="Skinless Chicken KG">

<input type="number" id="skinlessRateInput" placeholder="Skinless Chicken Rate">

<!-- LIVE -->

<input type="number" id="liveKG" placeholder="Live Chicken KG">

<input type="number" id="liveRateInput" placeholder="Live Chicken Rate">

<!-- DESI -->

<input type="number" id="desiKG" placeholder="Desi Chicken KG">

<input type="number" id="desiRateInput" placeholder="Desi Chicken Rate">

<!-- BONELESS -->

<input type="number" id="bonelessKG" placeholder="Boneless KG">

<input type="number" id="bonelessRateInput" placeholder="Boneless Rate">

<!-- LIVER -->

<input type="number" id="liverKG" placeholder="Liver KG">

<input type="number" id="liverRateInput" placeholder="Liver Rate">

<!-- EGG -->

<input type="number" id="eggQtyInput" placeholder="Egg Quantity">

<input type="number" id="eggRateInput" placeholder="Egg Rate">

</div>

<button class="generate-btn" onclick="generateBill()">

Generate Bill

</button>

<!-- BILL -->

<div class="bill" id="bill">

<div class="center">

<h2>

THREE BROTHERS  
FRESH CHICKEN

</h2>

<p>
Malancha, Bosirhat Road
</p>

<p>
PIN - 743456
</p>

<p>
WhatsApp - 8637575166
</p>

</div>

<div class="line"></div>

<p id="date"></p>

<p id="time"></p>

<p id="invoice"></p>

<p id="customer"></p>

<div class="line"></div>

<table>

<thead>

<tr>

<th>ITEM</th>

<th>QTY</th>

<th>RATE</th>

<th>AMOUNT</th>

</tr>

</thead>

<tbody>

<tr>

<td>Skinless</td>

<td id="skinlessQty"></td>

<td id="skinlessRate"></td>

<td id="skinlessAmount"></td>

</tr>

<tr>

<td>Live</td>

<td id="liveQty"></td>

<td id="liveRate"></td>

<td id="liveAmount"></td>

</tr>

<tr>

<td>Desi</td>

<td id="desiQty"></td>

<td id="desiRate"></td>

<td id="desiAmount"></td>

</tr>

<tr>

<td>Boneless</td>

<td id="bonelessQty"></td>

<td id="bonelessRate"></td>

<td id="bonelessAmount"></td>

</tr>

<tr>

<td>Liver</td>

<td id="liverQty"></td>

<td id="liverRate"></td>

<td id="liverAmount"></td>

</tr>

<tr>

<td>Egg</td>

<td id="eggQty"></td>

<td id="eggRate"></td>

<td id="eggAmount"></td>

</tr>

</tbody>

</table>

<div class="total">

<p>

<span>Subtotal</span>

<span id="subtotal"></span>

</p>

<p>

<span>CGST</span>

<span>0%</span>

</p>

<p>

<span>SGST</span>

<span>0%</span>

</p>

<p>

<b>NET AMOUNT</b>

<b id="netAmount"></b>

</p>

</div>

<div class="thankyou">

<h3>
❤️ THANK YOU ❤️
</h3>

<p>
Visit Again 😈
</p>

</div>

</div>

<!-- BUTTONS -->

<div class="buttons">

<button class="print-btn" onclick="window.print()">

🖨 PRINT BILL

</button>

<button class="save-btn" onclick="saveBill()">

💾 SAVE BILL

</button>

</div>

</div>

<script>

function generateBill(){

/* CUSTOMER */

let customer =
document.getElementById("customerName").value;

/* SKINLESS */

let skinlessKG =
parseFloat(document.getElementById("skinlessKG").value) || 0;

let skinlessRate =
parseFloat(document.getElementById("skinlessRateInput").value) || 0;

let skinlessTotal =
skinlessKG * skinlessRate;

/* LIVE */

let liveKG =
parseFloat(document.getElementById("liveKG").value) || 0;

let liveRate =
parseFloat(document.getElementById("liveRateInput").value) || 0;

let liveTotal =
liveKG * liveRate;

/* DESI */

let desiKG =
parseFloat(document.getElementById("desiKG").value) || 0;

let desiRate =
parseFloat(document.getElementById("desiRateInput").value) || 0;

let desiTotal =
desiKG * desiRate;

/* BONELESS */

let bonelessKG =
parseFloat(document.getElementById("bonelessKG").value) || 0;

let bonelessRate =
parseFloat(document.getElementById("bonelessRateInput").value) || 0;

let bonelessTotal =
bonelessKG * bonelessRate;

/* LIVER */

let liverKG =
parseFloat(document.getElementById("liverKG").value) || 0;

let liverRate =
parseFloat(document.getElementById("liverRateInput").value) || 0;

let liverTotal =
liverKG * liverRate;

/* EGG */

let eggQty =
parseFloat(document.getElementById("eggQtyInput").value) || 0;

let eggRate =
parseFloat(document.getElementById("eggRateInput").value) || 0;

let eggTotal =
eggQty * eggRate;

/* GRAND TOTAL */

let grandTotal =
skinlessTotal +
liveTotal +
desiTotal +
bonelessTotal +
liverTotal +
eggTotal;

/* SHOW BILL */

document.getElementById("bill").style.display =
"block";

/* DATE */

let now =
new Date();

document.getElementById("date").innerHTML =
"DATE : " + now.toLocaleDateString();

document.getElementById("time").innerHTML =
"TIME : " + now.toLocaleTimeString();

document.getElementById("invoice").innerHTML =
"BILL NO : #" + Math.floor(Math.random()*999999);

document.getElementById("customer").innerHTML =
"CUSTOMER : " + customer;

/* SHOW DATA */

/* SKINLESS */

document.getElementById("skinlessQty").innerHTML =
skinlessKG + "KG";

document.getElementById("skinlessRate").innerHTML =
"₹" + skinlessRate;

document.getElementById("skinlessAmount").innerHTML =
"₹" + skinlessTotal;

/* LIVE */

document.getElementById("liveQty").innerHTML =
liveKG + "KG";

document.getElementById("liveRate").innerHTML =
"₹" + liveRate;

document.getElementById("liveAmount").innerHTML =
"₹" + liveTotal;

/* DESI */

document.getElementById("desiQty").innerHTML =
desiKG + "KG";

document.getElementById("desiRate").innerHTML =
"₹" + desiRate;

document.getElementById("desiAmount").innerHTML =
"₹" + desiTotal;

/* BONELESS */

document.getElementById("bonelessQty").innerHTML =
bonelessKG + "KG";

document.getElementById("bonelessRate").innerHTML =
"₹" + bonelessRate;

document.getElementById("bonelessAmount").innerHTML =
"₹" + bonelessTotal;

/* LIVER */

document.getElementById("liverQty").innerHTML =
liverKG + "KG";

document.getElementById("liverRate").innerHTML =
"₹" + liverRate;

document.getElementById("liverAmount").innerHTML =
"₹" + liverTotal;

/* EGG */

document.getElementById("eggQty").innerHTML =
eggQty;

document.getElementById("eggRate").innerHTML =
"₹" + eggRate;

document.getElementById("eggAmount").innerHTML =
"₹" + eggTotal;

/* TOTAL */

document.getElementById("subtotal").innerHTML =
"₹" + grandTotal;

document.getElementById("netAmount").innerHTML =
"₹" + grandTotal;

/* SAVE */

let bills =
JSON.parse(localStorage.getItem("bills")) || [];

bills.push({

customer:customer,

total:grandTotal,

date:now.toLocaleDateString()

});

localStorage.setItem("bills",JSON.stringify(bills));

}

/* SAVE BILL */

function saveBill(){

let content =
document.getElementById("bill").innerHTML;

let blob =
new Blob([content], {type:"text/html"});

let link =
document.createElement("a");

link.href =
URL.createObjectURL(blob);

link.download =
"ThreeBrothersThermalBill.html";

link.click();

}

</script>

</body>

</html>
