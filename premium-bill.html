<!-- FILE NAME: premium-bill.html -->
<!-- PROFESSIONAL THERMAL BILL 😈 -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thermal Bill</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:monospace;
}

body{
background:#111;
padding:10px;
}

/* MAIN BOX */

.main-box{
max-width:380px;
margin:auto;
background:#1b1b1b;
padding:15px;
border-radius:10px;
}

.main-title{
text-align:center;
color:gold;
font-size:22px;
margin-bottom:15px;
}

/* INPUTS */

.input-grid{
display:flex;
flex-direction:column;
gap:10px;
}

.input-grid input{
padding:12px;
border:none;
background:#2a2a2a;
color:white;
border-radius:6px;
font-size:13px;
}

/* BUTTON */

.generate-btn{
margin-top:15px;
padding:12px;
border:none;
background:gold;
color:black;
font-size:14px;
font-weight:bold;
border-radius:6px;
cursor:pointer;
width:100%;
}

/* BILL */

.bill{
display:none;
width:300px;
background:white;
color:black;
margin:20px auto;
padding:10px;
font-size:12px;
}

/* CENTER */

.center{
text-align:center;
}

/* LINE */

.line{
border-top:1px dashed black;
margin:8px 0;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:11px;
}

th{
border-bottom:1px dashed black;
padding-bottom:5px;
}

td{
padding-top:8px;
text-align:center;
}

/* TOTAL */

.total{
margin-top:10px;
border-top:1px dashed black;
padding-top:10px;
}

.total p{
display:flex;
justify-content:space-between;
margin-top:5px;
}

/* THANK YOU */

.thankyou{
margin-top:15px;
text-align:center;
border-top:1px dashed black;
padding-top:10px;
}

/* BUTTONS */

.buttons{
margin-top:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.buttons button{
padding:12px;
border:none;
font-size:14px;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

.print-btn{
background:black;
color:white;
}

.save-btn{
background:gold;
color:black;
}

/* PRINT */

@media print{

body{
background:white;
padding:0;
}

.main-box{
display:none;
}

.buttons{
display:none;
}

.bill{
display:block;
width:58mm;
margin:0;
padding:5px;
box-shadow:none;
}

}

</style>

</head>

<body>

<div class="main-box">

<h1 class="main-title">

🐔 THERMAL BILL

</h1>

<!-- INPUT -->

<div class="input-grid">

<input type="text" id="customerName" placeholder="Customer Name">

<input type="text" id="productName" placeholder="Product Name">

<input type="number" id="productKG" placeholder="Quantity KG">

<input type="number" id="productPrice" placeholder="Price Per KG">

</div>

<button class="generate-btn" onclick="generateBill()">

Generate Bill

</button>

<!-- BILL -->

<div class="bill" id="bill">

<div class="center">

<h2>

THREE BROTHERS  
FRESH CHICKEN

</h2>

<p>
Malancha, Bosirhat Road
</p>

<p>
PIN - 743456
</p>

<p>
WhatsApp - 8637575166
</p>

</div>

<div class="line"></div>

<p id="date"></p>

<p id="time"></p>

<p id="invoice"></p>

<p id="customer"></p>

<div class="line"></div>

<table>

<thead>

<tr>

<th>ITEM</th>

<th>QTY</th>

<th>RATE</th>

<th>AMOUNT</th>

</tr>

</thead>

<tbody>

<tr>

<td id="showProduct"></td>

<td id="showKG"></td>

<td id="showRate"></td>

<td id="showAmount"></td>

</tr>

</tbody>

</table>

<div class="total">

<p>

<span>Subtotal</span>

<span id="subtotal"></span>

</p>

<p>

<span>CGST</span>

<span>0%</span>

</p>

<p>

<span>SGST</span>

<span>0%</span>

</p>

<p>

<b>NET AMOUNT</b>

<b id="netAmount"></b>

</p>

</div>

<div class="thankyou">

<h3>
❤️ THANK YOU ❤️
</h3>

<p>
Visit Again 😈
</p>

</div>

</div>

<!-- BUTTONS -->

<div class="buttons">

<button class="print-btn" onclick="window.print()">

🖨 PRINT BILL

</button>

<button class="save-btn" onclick="saveBill()">

💾 SAVE BILL

</button>

</div>

</div>

<script>

function generateBill(){

let customer =
document.getElementById("customerName").value;

let product =
document.getElementById("productName").value;

let kg =
parseFloat(document.getElementById("productKG").value);

let price =
parseFloat(document.getElementById("productPrice").value);

let total =
kg * price;

document.getElementById("bill").style.display =
"block";

/* DATE */

let now =
new Date();

document.getElementById("date").innerHTML =
"DATE : " + now.toLocaleDateString();

document.getElementById("time").innerHTML =
"TIME : " + now.toLocaleTimeString();

document.getElementById("invoice").innerHTML =
"BILL NO : #" + Math.floor(Math.random()*999999);

document.getElementById("customer").innerHTML =
"CUSTOMER : " + customer;

/* SHOW */

document.getElementById("showProduct").innerHTML =
product;

document.getElementById("showKG").innerHTML =
kg + "KG";

document.getElementById("showRate").innerHTML =
"₹" + price;

document.getElementById("showAmount").innerHTML =
"₹" + total;

document.getElementById("subtotal").innerHTML =
"₹" + total;

document.getElementById("netAmount").innerHTML =
"₹" + total;

/* SAVE */

let bills =
JSON.parse(localStorage.getItem("bills")) || [];

bills.push({

customer:customer,

product:product,

kg:kg,

price:price,

total:total

});

localStorage.setItem("bills",JSON.stringify(bills));

}

/* SAVE BILL */

function saveBill(){

let content =
document.getElementById("bill").innerHTML;

let blob =
new Blob([content], {type:"text/html"});

let link =
document.createElement("a");

link.href =
URL.createObjectURL(blob);

link.download =
"ThreeBrothersThermalBill.html";

link.click();

}

</script>

</body>

</html>
