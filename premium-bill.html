<!-- FILE NAME: premium-bill.html -->
<!-- MINI THERMAL BILL SYSTEM 😈 -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Three Brothers Bill</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:monospace;
}

body{
background:#111;
padding:10px;
}

/* MAIN */

.main-box{
max-width:400px;
margin:auto;
background:#1b1b1b;
padding:15px;
border-radius:12px;
}

/* TITLE */

.main-title{
text-align:center;
font-size:24px;
color:gold;
margin-bottom:20px;
}

/* INPUT */

.input-grid{
display:flex;
flex-direction:column;
gap:10px;
}

.input-grid input{
padding:12px;
border:none;
outline:none;
background:#2a2a2a;
color:white;
border-radius:8px;
font-size:14px;
}

/* BUTTON */

.generate-btn{
margin-top:15px;
padding:12px;
border:none;
background:gold;
color:black;
font-size:15px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
width:100%;
}

.generate-btn:hover{
opacity:0.9;
}

/* BILL */

.bill{
display:none;
margin-top:20px;
background:white;
color:black;
width:300px;
margin-left:auto;
margin-right:auto;
padding:15px;
border-radius:5px;
}

/* TOP */

.bill-top{
text-align:center;
border-bottom:1px dashed #000;
padding-bottom:10px;
margin-bottom:10px;
}

.shop-name{
font-size:18px;
font-weight:bold;
}

.bill-top p{
font-size:11px;
margin-top:3px;
}

/* CUSTOMER */

.customer-section{
font-size:12px;
line-height:1.8;
border-bottom:1px dashed #000;
padding-bottom:10px;
margin-bottom:10px;
}

/* TABLE */

.bill-table{
width:100%;
border-collapse:collapse;
font-size:11px;
}

.bill-table th{
border-bottom:1px dashed #000;
padding-bottom:5px;
}

.bill-table td{
padding-top:8px;
text-align:center;
}

/* TOTAL */

.total-area{
margin-top:10px;
border-top:1px dashed #000;
padding-top:10px;
font-size:13px;
}

.total-line{
display:flex;
justify-content:space-between;
margin-bottom:6px;
}

.grand-total{
font-size:16px;
font-weight:bold;
}

/* THANK YOU */

.thankyou{
margin-top:15px;
text-align:center;
border-top:1px dashed #000;
padding-top:10px;
}

.thankyou h1{
font-size:18px;
}

.thankyou p{
font-size:11px;
margin-top:5px;
}

/* BUTTONS */

.action-buttons{
margin-top:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.action-buttons button{
padding:12px;
border:none;
border-radius:8px;
font-size:14px;
font-weight:bold;
cursor:pointer;
}

.print-btn{
background:black;
color:white;
}

.save-btn{
background:gold;
color:black;
}

/* PRINT */

@media print{

body{
background:white;
padding:0;
}

.main-box{
display:none;
}

.bill{
display:block;
width:58mm;
box-shadow:none;
padding:5px;
}

.action-buttons{
display:none;
}

}

</style>

</head>

<body>

</div>

</div>

</div>

<!-- THANK YOU -->

<div class="thankyou">

<h1>
❤️ THANK YOU ❤️
</h1>

<p>
Thank You For Shopping
</p>

<p>
Visit Again 😈
</p>

</div>

</div>

<!-- BUTTONS -->

<div class="action-buttons">

<button class="print-btn" onclick="window.print()">

🖨 PRINT BILL

</button>

<button class="save-btn" onclick="saveBill()">

💾 SAVE BILL

</button>

</div>

</div>
